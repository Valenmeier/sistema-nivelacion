services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    env_file:
      - .env.docker
    volumes:
      - set_nivelacion_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - backend

  app:
    build: .
    restart: unless-stopped
    env_file:
      - .env.docker
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"
    networks:
      - backend
      - public

volumes:
  set_nivelacion_db_data:

networks:
  backend:
    internal: true
  public:
