services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    env_file:
      - .env.docker
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - set_nivelacion_dev_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  set_nivelacion_dev_db_data:
